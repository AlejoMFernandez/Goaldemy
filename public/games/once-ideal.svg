<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="oi-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#oi-bg)"/>
  <!-- Half pitch (top-down view) -->
  <rect x="35" y="40" width="130" height="120" rx="4" fill="none" stroke="#fb923c" stroke-width="1.5" opacity="0.4"/>
  <!-- Penalty area -->
  <rect x="60" y="40" width="80" height="40" rx="2" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
  <!-- Center circle -->
  <path d="M35 160h130" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
  <path d="M75 160a25 25 0 0150 0" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
  <!-- Formation dots (4-3-3) -->
  <!-- GK -->
  <circle cx="100" cy="50" r="6" fill="#fb923c" opacity="0.9"/>
  <!-- Defenders -->
  <circle cx="55" cy="80" r="5" fill="#fb923c" opacity="0.7"/>
  <circle cx="80" cy="75" r="5" fill="#fb923c" opacity="0.7"/>
  <circle cx="120" cy="75" r="5" fill="#fb923c" opacity="0.7"/>
  <circle cx="145" cy="80" r="5" fill="#fb923c" opacity="0.7"/>
  <!-- Midfielders -->
  <circle cx="70" cy="115" r="5" fill="#f97316" opacity="0.7"/>
  <circle cx="100" cy="110" r="5" fill="#f97316" opacity="0.7"/>
  <circle cx="130" cy="115" r="5" fill="#f97316" opacity="0.7"/>
  <!-- Forwards -->
  <circle cx="65" cy="148" r="5" fill="#ea580c" opacity="0.8"/>
  <circle cx="100" cy="145" r="6" fill="#ea580c" opacity="0.9"/>
  <circle cx="135" cy="148" r="5" fill="#ea580c" opacity="0.8"/>
  <!-- Star on striker -->
  <text x="100" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fb923c" opacity="0.5">4-3-3</text>
</svg>
