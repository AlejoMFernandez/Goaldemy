<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ao-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#881337"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#ao-bg)"/>
  <!-- Clock face -->
  <circle cx="100" cy="95" r="45" fill="none" stroke="#fb7185" stroke-width="2"/>
  <circle cx="100" cy="95" r="3" fill="#fb7185"/>
  <!-- Hour marks -->
  <line x1="100" y1="54" x2="100" y2="58" stroke="#fb7185" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="132" x2="100" y2="136" stroke="#fb7185" stroke-width="2" opacity="0.6"/>
  <line x1="59" y1="95" x2="63" y2="95" stroke="#fb7185" stroke-width="2" opacity="0.6"/>
  <line x1="137" y1="95" x2="141" y2="95" stroke="#fb7185" stroke-width="2" opacity="0.6"/>
  <!-- Clock hands -->
  <line x1="100" y1="95" x2="100" y2="65" stroke="#fb7185" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="95" x2="125" y2="85" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
  <!-- Age numbers below -->
  <text x="65" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fb7185" opacity="0.5">22</text>
  <text x="100" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#fb7185">28</text>
  <text x="135" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fb7185" opacity="0.5">35</text>
  <!-- Arrows -->
  <path d="M72 165h50" stroke="#fb7185" stroke-width="1" opacity="0.3"/>
  <path d="M118 165l5-3m-5 3l5 3" stroke="#fb7185" stroke-width="1" opacity="0.3"/>
</svg>
