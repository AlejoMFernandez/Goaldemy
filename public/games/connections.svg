<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="cn-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#cn-bg)"/>
  <!-- 4x4 grid of dots connected by lines -->
  <!-- Row 1 - yellow group -->
  <circle cx="50" cy="55" r="10" fill="#eab308" opacity="0.9"/>
  <circle cx="85" cy="55" r="10" fill="#eab308" opacity="0.9"/>
  <circle cx="120" cy="55" r="10" fill="#eab308" opacity="0.9"/>
  <circle cx="155" cy="55" r="10" fill="#eab308" opacity="0.9"/>
  <!-- Row 2 - green group -->
  <circle cx="50" cy="90" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="85" cy="90" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="120" cy="90" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="155" cy="90" r="10" fill="#22c55e" opacity="0.9"/>
  <!-- Row 3 - blue (unsolved, mixed) -->
  <circle cx="50" cy="125" r="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <circle cx="85" cy="125" r="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <circle cx="120" cy="125" r="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <circle cx="155" cy="125" r="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <!-- Row 4 - unsolved -->
  <circle cx="50" cy="160" r="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <circle cx="85" cy="160" r="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <circle cx="120" cy="160" r="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <circle cx="155" cy="160" r="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <!-- Decorative -->
  <circle cx="30" cy="30" r="3" fill="#38bdf8" opacity="0.3"/>
  <circle cx="170" cy="30" r="2" fill="#eab308" opacity="0.2"/>
</svg>
