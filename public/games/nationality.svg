<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="nat-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#083344"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#nat-bg)"/>
  <!-- Globe -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <ellipse cx="100" cy="100" rx="25" ry="50" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="100" x2="150" y2="100" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <!-- Latitude lines -->
  <ellipse cx="100" cy="78" rx="45" ry="8" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <ellipse cx="100" cy="122" rx="45" ry="8" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <!-- Flag pins -->
  <circle cx="80" cy="85" r="6" fill="#22d3ee" opacity="0.8"/>
  <circle cx="115" cy="108" r="6" fill="#06b6d4" opacity="0.8"/>
  <circle cx="95" cy="70" r="4" fill="#67e8f9" opacity="0.6"/>
  <!-- Decorative -->
  <circle cx="30" cy="30" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="170" cy="170" r="3" fill="#06b6d4" opacity="0.3"/>
</svg>
