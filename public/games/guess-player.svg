<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gp-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="gp-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#gp-bg)"/>
  <!-- Person silhouette -->
  <circle cx="100" cy="68" r="28" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <path d="M60 150c0-22 18-40 40-40s40 18 40 40" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <!-- Question mark -->
  <text x="100" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#34d399">?</text>
  <!-- Decorative dots -->
  <circle cx="30" cy="30" r="3" fill="#34d399" opacity="0.3"/>
  <circle cx="170" cy="170" r="3" fill="#06b6d4" opacity="0.3"/>
  <circle cx="170" cy="30" r="2" fill="#34d399" opacity="0.2"/>
  <circle cx="30" cy="170" r="2" fill="#06b6d4" opacity="0.2"/>
</svg>
