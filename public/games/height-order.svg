<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ho-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#ho-bg)"/>
  <!-- Height measurement ruler -->
  <line x1="45" y1="45" x2="45" y2="160" stroke="#2dd4bf" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="45" x2="50" y2="45" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4"/>
  <line x1="42" y1="70" x2="48" y2="70" stroke="#2dd4bf" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="95" x2="48" y2="95" stroke="#2dd4bf" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="120" x2="48" y2="120" stroke="#2dd4bf" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="145" x2="48" y2="145" stroke="#2dd4bf" stroke-width="1" opacity="0.3"/>
  <!-- Person silhouettes at different heights -->
  <!-- Tall -->
  <circle cx="80" cy="62" r="10" fill="#2dd4bf" opacity="0.8"/>
  <rect x="74" y="74" width="12" height="42" rx="4" fill="#2dd4bf" opacity="0.6"/>
  <rect x="72" y="116" width="7" height="20" rx="3" fill="#2dd4bf" opacity="0.5"/>
  <rect x="81" y="116" width="7" height="20" rx="3" fill="#2dd4bf" opacity="0.5"/>
  <!-- Medium -->
  <circle cx="115" cy="82" r="9" fill="#14b8a6" opacity="0.7"/>
  <rect x="110" y="93" width="10" height="35" rx="3" fill="#14b8a6" opacity="0.5"/>
  <rect x="108" y="128" width="6" height="18" rx="2" fill="#14b8a6" opacity="0.4"/>
  <rect x="116" y="128" width="6" height="18" rx="2" fill="#14b8a6" opacity="0.4"/>
  <!-- Short -->
  <circle cx="148" cy="100" r="8" fill="#0d9488" opacity="0.6"/>
  <rect x="143" y="110" width="10" height="28" rx="3" fill="#0d9488" opacity="0.4"/>
  <rect x="141" y="138" width="6" height="15" rx="2" fill="#0d9488" opacity="0.35"/>
  <rect x="149" y="138" width="6" height="15" rx="2" fill="#0d9488" opacity="0.35"/>
  <!-- Up/down arrows -->
  <path d="M160 55l5-8 5 8M160 160l5 8 5-8" stroke="#2dd4bf" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="165" y1="55" x2="165" y2="160" stroke="#2dd4bf" stroke-width="1" opacity="0.2"/>
