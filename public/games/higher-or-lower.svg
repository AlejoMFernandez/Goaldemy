  <!-- VS text -->
  <text x="100" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="white" opacity="0.8">VS</text>
  <!-- Decorative -->
  <circle cx="30" cy="30" r="3" fill="#f97316" opacity="0.3"/>
  <circle cx="170" cy="170" r="3" fill="#22c55e" opacity="0.3"/>
