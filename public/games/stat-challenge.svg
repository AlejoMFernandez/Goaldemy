<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="sc-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#sc-bg)"/>
  <!-- Bar chart -->
  <rect x="45" y="110" width="24" height="50" rx="3" fill="#22c55e" opacity="0.9"/>
  <rect x="78" y="80" width="24" height="80" rx="3" fill="#38bdf8" opacity="0.9"/>
  <rect x="111" y="95" width="24" height="65" rx="3" fill="#eab308" opacity="0.9"/>
  <rect x="144" y="120" width="24" height="40" rx="3" fill="#a855f7" opacity="0.8"/>
  <!-- Labels -->
  <text x="57" y="105" text-anchor="middle" font-family="system-ui" font-size="11" fill="#22c55e" font-weight="700">G</text>
  <text x="90" y="75" text-anchor="middle" font-family="system-ui" font-size="11" fill="#38bdf8" font-weight="700">A</text>
  <text x="123" y="90" text-anchor="middle" font-family="system-ui" font-size="11" fill="#eab308" font-weight="700">P</text>
  <text x="156" y="115" text-anchor="middle" font-family="system-ui" font-size="11" fill="#a855f7" font-weight="700">?</text>
  <!-- Question mark -->
  <text x="100" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="white" opacity="0.6">Stats</text>
  <!-- Decorative -->
  <circle cx="30" cy="30" r="3" fill="#818cf8" opacity="0.3"/>
  <circle cx="170" cy="170" r="3" fill="#22c55e" opacity="0.3"/>
</svg>
