name: Refrescar datos de jugadores

# Regenera src/dataGAMES.json con los planteles actuales de FotMob y, si hubo
# cambios, commitea el archivo. El push dispara el redeploy automático en Vercel.
on:
  schedule:
    - cron: '0 6 * * 1'   # Todos los lunes 06:00 UTC (03:00 ART)
  workflow_dispatch: {}    # Botón para correrlo a mano desde la pestaña Actions

permissions:
  contents: write          # necesario para que el bot pueda hacer push

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refrescar planteles desde FotMob
        run: node scripts/refresh-fotmob-squads.cjs

      - name: Commitear si hay cambios
        run: |
          git config user.name "goaldemy-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/dataGAMES.json
          if git diff --staged --quiet; then
            echo "Sin cambios en dataGAMES.json — no se commitea nada."
          else
            git commit -m "chore(data): refresco automático de planteles (FotMob)"
            git push
          fi
